basePath: /api
definitions:
  api.AccountResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      type:
        type: integer
    type: object
  api.CardResponse:
    properties:
      account_id:
        type: integer
      credit_limit:
        type: integer
      cutoff_date:
        type: integer
      id:
        type: integer
      name:
        type: string
      type:
        type: string
    type: object
  api.CreateAccountRequest:
    properties:
      name:
        type: string
      type:
        type: integer
    type: object
  api.CreateCardRequest:
    properties:
      account_id:
        type: integer
      credit_limit:
        type: integer
      cutoff_date:
        type: integer
      name:
        type: string
      type:
        type: string
    type: object
  api.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      passkey_id:
        type: string
    type: object
  api.TelegramAuthRequest:
    properties:
      auth_date:
        type: integer
      first_name:
        type: string
      hash:
        type: string
      id:
        type: integer
      last_name:
        type: string
      photo_url:
        type: string
      username:
        type: string
    type: object
  api.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Backend for personal finances
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Flizix API
  version: "1.0"
paths:
  /accounts:
    get:
      description: Get all bank and cash accounts for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.AccountResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all bank accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a bank or cash account for the authenticated user
      parameters:
      - description: Account data
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/api.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AccountResponse'
        "400":
          description: Invalid request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a new bank account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Soft delete a specific bank account for the authenticated user
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a bank account
      tags:
      - accounts
  /auth/dev-login:
    post:
      description: Omits Telegram validation and generate a JWT token for a testing
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Development login
      tags:
      - auth
  /auth/logout:
    post:
      description: Delete cookie on browser session sending an expired cookie
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Close session
      tags:
      - auth
  /auth/telegram:
    post:
      consumes:
      - application/json
      description: Validate Telegram hash, search or create user emitting a JWT o
        a cookie.
      parameters:
      - description: telegram data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/api.TelegramAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.UserResponse'
      summary: Login con Telegram
      tags:
      - auth
  /cards:
    get:
      description: Get all credit and debit cards for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CardResponse'
            type: array
        "401":
          description: Not authorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all cards
      tags:
      - cards
    post:
      consumes:
      - application/json
      description: Create a credit or debit card for the authenticated user
      parameters:
      - description: Card data
        in: body
        name: card
        required: true
        schema:
          $ref: '#/definitions/api.CreateCardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.CardResponse'
        "400":
          description: Invalid request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a new card
      tags:
      - cards
  /health:
    get:
      description: Returns simple message to validate server is running
      produces:
      - text/plain
      responses:
        "200":
          description: Flizix service OK
          schema:
            type: string
      summary: Check health system
      tags:
      - system
  /me:
    get:
      description: Get userdata using JWT on cookie.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.UserResponse'
        "401":
          description: Not authorized
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get profile
      tags:
      - users
  /users:
    post:
      consumes:
      - application/json
      description: Register new user on DB with name, email and passkey ID.
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/api.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.UserResponse'
        "400":
          description: Invalid JSON
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create new user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
